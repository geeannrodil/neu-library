<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - NEU Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="admin-page">
    
    <div class="admin-layout">
        <aside class="sidebar">
            <img src="neu-logo.png" class="side-logo">
            <nav>
                <button class="nav-item active">📊 Dashboard</button>
                <button class="nav-item" onclick="exportToPDF()">📄 Export PDF</button>
                <a href="/" class="nav-item logout">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1>Library Analytics</h1>
            </header>

            <section class="stats-row">
                <div class="stat-box"><span>Today</span><h2 id="s-today">0</h2></div>
                <div class="stat-box"><span>This Week</span><h2 id="s-week">0</h2></div>
                <div class="stat-box"><span>This Month</span><h2 id="s-month">0</h2></div>
                <div class="stat-box accent"><span>Total Logs</span><h2 id="s-total">0</h2></div>
            </section>

            <section class="table-card">
                <div class="table-tools">
                    <h3>Recent Visitors</h3>
                    <input type="text" id="search" class="search-box" placeholder="Search visitors..." onkeyup="searchLogs()">
                </div>
                <div style="overflow-x: auto;">
                    <table id="logTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Purpose</th>
                                <th>Timestamp</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="logBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
