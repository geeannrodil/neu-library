<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - NEU Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body id="admin-page">
    <div class="sidebar">
        <img src="logo.png" class="fix-logo-admin">
        <h3>Admin Panel</h3>
        <button class="side-btn active">DASHBOARD</button>
        <button class="side-btn" onclick="loadAdminTable()">REFRESH LOGS</button>
        <a href="index.html" class="side-btn logout" style="margin-top: auto;">LOG OUT</a>
    </div>

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <input type="text" id="searchBar" placeholder="Search Names, ID, Course, Reason..." onkeyup="filterTable()" class="search-box">
            <button class="pdf-btn" onclick="exportToPDF()">EXPORT PDF</button>
        </div>

        <div class="table-container">
            <table id="logTable">
                <thead>
                    <tr>
                        <th>NAME</th>
                        <th>EMAIL / ID</th>
                        <th>REASON</th>
                        <th>TIME IN</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
