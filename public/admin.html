<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NEU Library</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">
    <div class="sidebar">
        <div class="brand">
            <img src="neu-logo.png" alt="NEU Logo" class="sidebar-logo">
            <div class="brand-text">
                <h3>NEW ERA UNIVERSITY</h3>
                <p>Library Department</p>
            </div>
        </div>
        
        <nav class="nav-menu">
            <a href="#dashboard-view" class="nav-item active" onclick="switchView('dashboard', event)"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="#logs-view" class="nav-item" onclick="switchView('logs', event)"><i class="fas fa-history"></i> Visitor Logs</a>
            <a href="#users-view" class="nav-item" onclick="switchView('users', event)"><i class="fas fa-users-cog"></i> User Management</a>
            
            <a href="/?mode=test" class="nav-item" style="color: #f1c40f; margin-top: 20px;">
                <i class="fas fa-vial"></i> Test Visitor Mode
            </a>
        </nav>

        <div class="sidebar-footer">
            <button onclick="exportPDF()" class="btn-secondary"><i class="fas fa-file-pdf"></i> Export PDF</button>
            <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        </div>
    </div>

    <main class="main-content" id="dashboard-view">
        <header class="content-header">
            <h1>Visitor Dashboard</h1>
            <div class="status-indicator">
                <span class="dot"></span> OPEN
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <p>Today</p>
                <h2 id="todayCount">0</h2>
            </div>
            <div class="stat-card">
                <p>This Week</p>
                <h2 id="weekCount">0</h2>
            </div>
            <div class="stat-card">
                <p>This Month</p>
                <h2 id="monthCount">0</h2>
            </div>
            <div class="stat-card highlight">
                <p>Total Logs</p>
                <h2 id="totalCount">0</h2>
            </div>
        </section>

        <section class="log-section" id="logs-view">
            <div class="section-header">
                <h3>Recent Visitors</h3>
                <div class="search-box">
                    <input type="text" id="logSearch" placeholder="Search name, course, or reason...">
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Course</th>
                            <th>Purpose</th>
                            <th>Timestamp</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="visitorLogs"></tbody>
                </table>
            </div>
        </section>

        <section class="log-section" id="users-view" style="margin-top: 50px;">
            <div class="section-header">
                <h3>User Management (Blocked Users)</h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Email Address</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="blockedUserList">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
