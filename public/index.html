<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Check-in</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="visitor-page">

    <div class="split-container">
        <div class="left-panel">
            <img src="neu-logo.png" alt="NEU Logo" class="brand-logo">
            <h1 class="brand-title">Library</h1>
            <div class="clock-box">
                <h1 id="live-time">00:00:00</h1>
                <p id="live-date">Loading...</p>
            </div>
        </div>

        <div class="right-panel">
            <div id="step-login" class="glass-card">
                <div class="card-header">
                    <h2>Check-in / Out</h2>
                    <span class="status-badge"><span class="dot"></span> OPEN</span>
                </div>
                <p class="instruction">Please sign in with your Google account.</p>
                
                <div id="g_id_onload"
                     data-client_id="316520894915-d3kl097kp2qb0j0ddqtsqno29807gt3t.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
            </div>

            <div id="step-reason" class="glass-card" style="display:none;">
    <div class="card-header">
        <h2>Visitor Details</h2>
    </div>
    
    <div class="form-group">
        <label>I am a:</label>
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="userType" value="Student" checked>
                <span class="radio-custom">🎓 Student</span>
            </label>
            <label class="radio-label">
                <input type="radio" name="userType" value="Faculty">
                <span class="radio-custom">💼 Faculty</span>
            </label>
        </div>
    </div>

    <div class="form-group">
        <label>Program / Course:</label>
        <input type="text" id="course" class="glass-input" placeholder="e.g., BSCS, BSIT, CBA...">
    </div>

    <h3 class="sub-heading">Purpose of Visit:</h3>
    <div class="reason-grid">
        <button onclick="submitVisit('Studying')">📖 Studying</button>
        <button onclick="submitVisit('Research')">🔍 Research</button>
        <button onclick="submitVisit('Borrowing')">📚 Borrowing</button>
        <button onclick="submitVisit('Computer')">💻 Computer Use</button>
    </div>
    <p id="error-msg" class="error-text"></p>
</div>
        </div>
    </div>

    <div id="welcome-overlay" class="modal-overlay">
        <div class="welcome-card">
            <div class="check-circle">✓</div>
            <h1>WELCOME TO NEU LIBRARY</h1>
            <p id="visitor-name">Student Name!</p>
            <small style="color: #a89bbd;">Redirecting...</small>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
