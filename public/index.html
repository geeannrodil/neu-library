<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Visitor Check-in</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div class="split-container">
        
        <div class="left-panel">
            <img src="./neu-logo.png" alt="NEU Logo" class="brand-logo">
            <h2 class="brand-subtitle">NEW ERA UNIVERSITY</h2>
            <h1 class="brand-title">Library</h1>
            <p class="brand-subtext">Visitor Check-in</p>

            <div class="clock-container">
                <h1 id="live-time">00:00:00 AM</h1>
                <p id="live-date">Loading date...</p>
            </div>
        </div>

        <div class="right-panel">
            <div class="glass-card">
                <div class="card-header">
                    <h2>Check-in / Out</h2>
                    <span class="status-badge"><span class="dot"></span> OPEN</span>
                </div>
                
                <p class="instruction-text">Sign in with your Google account to check in or out.</p>

                <div id="g_id_onload"
                     data-client_id="316520894915-d3kl097kp2qb0j0ddqtsqno29807gt3t.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                     </div>
                
                <div class="google-btn-wrapper">
                    <div class="g_id_signin"
                         data-type="standard"
                         data-size="large"
                         data-theme="outline"
                         data-text="sign_in_with"
                         data-shape="pill"
                         data-logo_alignment="left">
                    </div>
                </div>

                <div class="divider">
                    <span>Library Management System</span>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
